{% extends 'base.html' %}

{% block content %}
<h1>Новости</h1>

{% for item in news_list %}
<div>
    <img src="{{ item.cover_image.url }}" alt="{{ item.title }}" width="200", height="200">
    <h2>{{ item.title }}</h2>
    <p>{{ item.created_at|date:"d.m.Y" }}</p>
    <p>{{ item.content|truncatewords:20 }}</p>
    <a href="/news/{{ item.id }}/">Читать →</a>
</div>
<hr>
{% empty %}
<p>Новостей пока нет</p>
{% endfor %}

<a href="/">← На главную</a>
{% endblock %}
