{% extends 'base.html' %}

{% block content %}
<h2>{{ branch.name }}</h2>
<img src="{{ branch.photo.url }}" alt="{{ branch.name }}" style="max-width:30%; height:30%;">

<p>
    <b>Город:</b> {{ branch.city }}<br>
    <b>Адрес:</b> {{ branch.address }}<br>
    <b>Телефон:</b> {{ branch.phone }}<br>
    <b>Менеджер:</b> {{ branch.manager_name }}

</p>

<p>{{ branch.description }}</p>

<a href="/branches/">← Назад</a>
{% endblock %}
