{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Вход — iSwim{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-4">Вход</h1>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Войти</button>
        </form>
        <p class="text-center mt-3 text-muted">
            Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
