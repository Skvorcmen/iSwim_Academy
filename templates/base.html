<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}iSwim Academy{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- ШАПКА -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <!-- Название слева -->
            <a class="navbar-brand" href="/">iSwim Academy</a>

            <!-- Кнопки в центре/справа -->
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/news/">Новости</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/education/">Обучение</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/branches/">Филиалы</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/coaches/">Тренеры</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login/">Вход</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- КОНТЕНТ -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- ПОДВАЛ -->
    <footer class="bg-dark text-white mt-5 py-3">
        <div class="container text-center">
            <a href="/about/" class="text-white me-3">О нас</a>
            <a href="/contacts/" class="text-white">Контакты</a>
            <p class="mt-2 mb-0">© 2026 iSwim Academy</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
