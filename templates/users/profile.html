{% extends 'base.html' %}

{% block title %}Профиль — iSwim{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <h1 class="mb-4">Личный кабинет</h1>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div style="width: 60px; height: 60px; border-radius: 50%; background: rgba(0,102,204,0.1); display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-user fa-2x text-primary"></i>
                    </div>
                    <div>
                        <h5 class="mb-0">{{ user.username }}</h5>
                        <p class="text-muted small mb-0">{{ user.get_role_display }}</p>
                    </div>
                </div>
                <hr>
                <p class="mb-1"><i class="fas fa-envelope me-2 text-muted"></i>{{ user.email }}</p>
                <p class="mb-0"><i class="fas fa-calendar me-2 text-muted"></i>Зарегистрирован: {{ user.date_joined|date:"d.m.Y" }}</p>
            </div>
        </div>

        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger w-100">Выйти</button>
        </form>

    </div>
</div>
{% endblock %}
